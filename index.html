<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JIEPANG</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f2f2;
      color: #111;
    }

    header {
      border-bottom: 1px solid #ddd;
      background: #f2f2f2;
    }

    .nav {
      max-width: 1280px;
      margin: 0 auto;
      padding: 22px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
    }

    .brand a {
      color: #111;
      text-decoration: none;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .menu a {
      margin-left: 28px;
      color: #111;
      text-decoration: none;
      font-size: 18px;
    }

    .hero {
      max-width: 1280px;
      margin: 36px auto 56px auto;
      padding: 0 32px;
      box-sizing: border-box;
      position: relative;
      height: 260px;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 58%;
      display: block;
    }

    .hero-title {
      position: absolute;
      left: 54px;
      bottom: 24px;
      color: white;
      font-size: 56px;
      font-weight: 300;
      letter-spacing: 4px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
    }

    .intro {
      max-width: 1280px;
      margin: 0 auto 110px auto;
      padding: 0 32px;
      box-sizing: border-box;
    }

   .intro {
  max-width: 1280px;
  margin: 0 auto 110px auto;
  padding: 0 32px;
  box-sizing: border-box;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 60px;
  align-items: start;
}

.intro-text h1 {
  font-size: 42px;
  font-weight: 500;
  margin: 0 0 24px 0;
}

.intro-text p {
  font-size: 22px;
  line-height: 1.9;
  margin: 0;
}

.intro-image img {
  width: 100%;
  height: auto;
  display: block;
}
    }

   @media (max-width: 900px) {
  .nav {
    flex-direction: column;
    gap: 14px;
  }

  .menu a {
    margin: 0 12px;
  }

  .hero {
    height: 180px;
  }

  .hero-title {
    left: 40px;
    bottom: 18px;
    font-size: 34px;
  }

  .intro {
    grid-template-columns: 1fr;
    gap: 32px;
  }

  .intro-text h1 {
    font-size: 32px;
  }

  .intro-text p {
    font-size: 18px;
  }
}
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="nav">
      <div class="brand"><a href="/">JIEPANG</a></div>
      <div class="menu">
        <a href="/about.html">About</a>
        <a href="/works.html">Works</a>
        <a href="/writing.html">Writing</a>
      </div>
    </div>
  </header>

  <section class="hero">
    <img src="/assets/mirror-lake.jpg" alt="Mirror Lake lacquer image" />
    <div class="hero-title">JIEPANG</div>
  </section>

 <section class="intro">
  <div class="intro-text">
    <h1>Material Statement</h1>
    <p>
      Lacquer is not merely a material. It is time, memory, and transformation made visible.
      My work approaches lacquer as a civilizational medium: a structure through which surfaces
      are constructed, memory is preserved, and permanence is imagined.
    </p>
  </div>

  <div class="intro-image">
    <img src="/assets/mirror-lake.jpg" alt="Mirror Lake lacquer image" />
  </div>
</section>
</body>
</html>
