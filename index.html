<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pang Jie</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      color: #111;
    }

    .hero {
  width: 100%;
  text-align: center;
  padding: 40px 0 20px 0;
}

.hero img {
  width: 90%;
  max-width: 1200px;
  height: auto;
  display: inline-block;
}
    }

    .section {
      max-width: 1100px;
      margin: 120px auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      padding: 0 40px;
      box-sizing: border-box;
    }

    .section img {
      width: 100%;
      display: block;
    }

    .text {
      font-size: 18px;
      line-height: 1.8;
    }

    h2 {
      font-size: 32px;
      margin-bottom: 20px;
      font-weight: 500;
    }
  </style>
</head>
<body>
 <div class="hero">
  <img src="https://jiepang-art.github.io/assets/mirror-lake.jpg" alt="Mirror Lake lacquer image">
</div>

  <div class="section">
    <div class="text">
      <h2>Material Statement</h2>
      <p>
        Lacquer is not merely a material. It is time, memory,
        and transformation made visible. My work approaches lacquer
        as a civilizational medium: a structure through which surfaces
        are constructed, memory is preserved, and permanence is imagined.
      </p>
    </div>

    <div>
      <img src="https://jiepang-art.github.io/assets/mirror-lake.jpg" alt="Mirror Lake lacquer image">
    </div>
  </div>
</body>
</html>
