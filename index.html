<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pang Jie</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f2f2;
      color: #111;
    }

    header {
      border-bottom: 1px solid #ddd;
      background: #f2f2f2;
    }

    .nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
    }

    .brand {
      font-size: 28px;
      font-weight: 400;
    }

    .menu a {
      margin-left: 28px;
      color: #111;
      text-decoration: none;
      font-size: 18px;
    }

    .hero {
      max-width: 1200px;
      margin: 36px auto 60px auto;
      padding: 0 32px;
      box-sizing: border-box;
    }

    .hero img {
     .hero {
  max-width: 1200px;
  margin: 36px auto 60px auto;
  padding: 0 32px;
  box-sizing: border-box;
  overflow: hidden;
  height: 260px;   /* 控制裁切高度 */
  position: relative;
}

.hero img {
  width: 100%;
  height: 30%;
  object-fit: cover;
  object-position: center 40%;
}
    }

    .intro {
      max-width: 1200px;
      margin: 0 auto 100px auto;
      padding: 0 32px;
      box-sizing: border-box;
    }

    .intro h1 {
      font-size: 42px;
      font-weight: 400;
      margin: 0 0 24px 0;
    }

    .intro p {
      max-width: 760px;
      font-size: 22px;
      line-height: 1.8;
      margin: 0;
    }

    @media (max-width: 900px) {
      .nav {
        flex-direction: column;
        gap: 14px;
      }

      .menu a {
        margin: 0 12px;
      }

      .intro h1 {
        font-size: 34px;
      }

      .intro p {
        font-size: 19px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="nav">
      <div class="brand">JIEPANG</div>
      <div class="menu">
        <a href="about.html">About</a>
        <a href="works.html">Works</a>
        <a href="writing.html">Writing</a>
      </div>
    </div>
  </header>

  <section class="hero">
    <img src="https://jiepang-art.github.io/assets/mirror-lake.jpg" alt="Mirror Lake lacquer image" />
  </section>

  <section class="intro">
    <h1>Pang Jie</h1>
    <p>
      Lacquer is not merely a material. It is time, memory, and transformation made visible.
      My work approaches lacquer as a civilizational medium: a structure through which surfaces
      are constructed, memory is preserved, and permanence is imagined.
    </p>
  </section>
</body>
</html>
